<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>

        <section class="container pt-4">
            <div class="row g-4">
                <!-- Filtro por categoría (HU-04) -->
                <div class="col-md-3">
                    <aside th:replace="~{producto/fragmentos :: filtros}"/>
                </div>
                <!-- Listado de productos -->
                <div class="col-md-9">
                    <h2 th:if="${busquedaActual == null and categoriaActual == null}">[[#{producto.catalogo}]]</h2>
                    <h2 th:if="${busquedaActual != null}">[[#{producto.resultados}]]: "[[${busquedaActual}]]"</h2>
                    <h2 th:if="${categoriaActual != null}">[[${categoriaActual.descripcion}]]</h2>
                    <p class="text-muted">[[${totalProductos}]] [[#{producto.encontrados}]]</p>

                    <div th:if="${productos != null and !productos.empty}">
                        <section th:replace="~{producto/fragmentos :: tarjetas(${productos})}"/>
                    </div>
                    <div class="text-center p-5" th:if="${productos == null or productos.empty}">
                        <i class="fa-solid fa-leaf fa-2x text-nasu mb-2"></i>
                        <p class="lead">[[#{producto.sinProductos}]]</p>
                    </div>
                </div>
            </div>
        </section>

        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
