<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>

        <section class="container py-5">
            <h2 class="text-center mb-2">[[#{contacto.titulo}]]</h2>
            <p class="text-center text-muted mb-4">[[#{contacto.texto}]]</p>
            <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
                <div class="col">
                    <div class="card card-producto text-center h-100 p-3">
                        <div class="card-body">
                            <i class="fa-solid fa-envelope fa-2x text-nasu mb-3"></i>
                            <h5>[[#{contacto.correo}]]</h5>
                            <p class="mb-0">hola@nasu.cr</p>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card card-producto text-center h-100 p-3">
                        <div class="card-body">
                            <i class="fa-solid fa-location-dot fa-2x text-nasu mb-3"></i>
                            <h5>[[#{contacto.ubicacion}]]</h5>
                            <p class="mb-0">[[#{contacto.ubicacion.detalle}]]</p>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card card-producto text-center h-100 p-3">
                        <div class="card-body">
                            <i class="fa-solid fa-clock fa-2x text-nasu mb-3"></i>
                            <h5>[[#{contacto.horario}]]</h5>
                            <p class="mb-0">[[#{contacto.horario.detalle}]]</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
